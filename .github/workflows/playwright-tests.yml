name: Playwright Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: E2E Login Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crm-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: crm-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: crm-frontend
        run: npx playwright install --with-deps chromium

      - name: Setup Python for backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: crm-backend
        run: pip install -r requirements.txt

      - name: Start backend server
        working-directory: crm-backend
        env:
          DATABASE_URL: sqlite:///./test.db
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl --fail http://localhost:8000/docs || exit 1

      - name: Run Playwright tests
        working-directory: crm-frontend
        run: npx playwright test
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: crm-frontend/playwright-report/
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: crm-frontend/test-results/
          retention-days: 7
